syntax = "proto3";
package com.openexchange.oms.grpc;
option java_package = "com.openexchange.oms.grpc";
option java_multiple_files = true;

service OrderService {
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
    rpc GetOrder(GetOrderRequest) returns (OrderResponse);
    // History reads (oms#40) — Postgres-backed, survive OMS restarts
    rpc GetOrderHistory(OrderHistoryRequest) returns (OrderHistoryResponse);
    rpc GetTrades(GetTradesRequest) returns (GetTradesResponse);
    rpc StreamOrders(StreamRequest) returns (stream OrderUpdate);
    rpc StreamExecutions(StreamRequest) returns (stream ExecutionReport);
}

service AccountService {
    rpc GetBalances(GetBalancesRequest) returns (BalancesResponse);
    rpc StreamBalances(StreamRequest) returns (stream BalanceUpdate);
}

message CreateOrderRequest {
    int64 user_id = 1;
    int32 market_id = 2;
    string side = 3;
    string order_type = 4;
    string time_in_force = 5;
    // Money is an exact decimal string with at most 8 fractional digits
    // (oms#39): doubles cannot represent money exactly.
    string price = 6;
    string quantity = 7;
    string stop_price = 8;
    string trailing_delta = 9;
    string display_quantity = 10;
    int64 expires_at_ms = 11;
    string client_order_id = 12;
}

message CreateOrderResponse {
    bool accepted = 1;
    int64 oms_order_id = 2;
    string status = 3;
    string reject_reason = 4;
    // True when client_order_id already names an active order (oms#40):
    // nothing was created; oms_order_id/status describe the existing order.
    bool duplicate = 5;
}

message OrderHistoryRequest {
    int64 user_id = 1;
    string status = 2; // "" = all statuses
    int32 limit = 3;   // 0 = default 100, capped at 1000
    int32 offset = 4;
}

message OrderHistoryResponse {
    repeated OrderResponse orders = 1;
}

message GetTradesRequest {
    int64 user_id = 1;
    int32 limit = 2;   // 0 = default 100, capped at 1000
    int32 offset = 3;
}

message GetTradesResponse {
    repeated ExecutionReport executions = 1;
}

message CancelOrderRequest {
    int64 oms_order_id = 1;
}

message CancelOrderResponse {
    bool accepted = 1;
    int64 oms_order_id = 2;
    string message = 3;
}

message GetOrderRequest {
    int64 oms_order_id = 1;
}

message OrderResponse {
    int64 oms_order_id = 1;
    int64 cluster_order_id = 2;
    string client_order_id = 3;
    int64 user_id = 4;
    int32 market_id = 5;
    string side = 6;
    string order_type = 7;
    string time_in_force = 8;
    // Exact 8-dp decimal strings (oms#39)
    string price = 9;
    string quantity = 10;
    string filled_qty = 11;
    string remaining_qty = 12;
    string stop_price = 13;
    string status = 14;
    string reject_reason = 15;
    int64 created_at_ms = 16;
    int64 updated_at_ms = 17;
}

message StreamRequest {
    int64 user_id = 1;
}

message OrderUpdate {
    string event_type = 1;
    OrderResponse order = 2;
}

message ExecutionReport {
    int64 trade_id = 1;
    int64 oms_order_id = 2;
    int64 cluster_order_id = 3;
    int64 user_id = 4;
    int32 market_id = 5;
    string side = 6;
    // Exact 8-dp decimal strings (oms#39)
    string price = 7;
    string quantity = 8;
    bool is_maker = 9;
    int64 executed_at_ms = 10;
}

message GetBalancesRequest {
    int64 user_id = 1;
}

message BalancesResponse {
    int64 user_id = 1;
    repeated AssetBalance assets = 2;
}

message AssetBalance {
    string asset = 1;
    int32 asset_id = 2;
    // Exact 8-dp decimal strings (oms#39)
    string available = 3;
    string locked = 4;
    string total = 5;
}

message BalanceUpdate {
    string event_type = 1;
    int64 user_id = 2;
    repeated AssetBalance assets = 3;
}
